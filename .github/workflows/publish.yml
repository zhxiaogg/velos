name: Publish

# Publishes every workspace crate to crates.io, in dependency order, via
# Trusted Publishing (OIDC) — no long-lived token. Also attaches prebuilt
# binaries to the GitHub release.
#
# One-time setup on crates.io (after each crate exists): crate Settings ->
# Trusted Publishing -> GitHub, with repository zhxiaogg/velos and workflow
# publish.yml (each crate needs its own config).
#
# Bootstrap caveat: trusted publishing can only be configured for crates that
# already exist on crates.io, so the very first publish falls back to the
# CARGO_REGISTRY_TOKEN repo secret. Delete the secret once OIDC is configured.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token exchanged for a temp crates.io token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # The web UI is not committed; build it just-in-time so `include` bakes it
      # into the published velos-apiserver crate.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build web UI
        run: cd web && npm ci && npm run build

      - name: Authenticate with crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
        # First-ever publish has no trusted-publishing config yet; fall through
        # to the token secret below instead of failing the run.
        continue-on-error: true

      # Publish each publishable member (derived from cargo metadata, so new
      # crates are picked up automatically), skipping versions the registry
      # already has. Multiple passes resolve dependency order: a crate whose
      # deps aren't published yet fails its pass and succeeds in a later one.
      - name: cargo publish
        run: |
          mapfile -t pkgs < <(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.publish == null) | "\(.name) \(.version)"')
          for pass in $(seq 1 ${#pkgs[@]}); do
            progress=0 remaining=0
            for pkg in "${pkgs[@]}"; do
              name=${pkg% *} version=${pkg#* }
              if curl -fsS -A "publish-workflow (github.com/${{ github.repository }})" \
                  "https://crates.io/api/v1/crates/$name/$version" >/dev/null 2>&1; then
                continue
              fi
              remaining=1
              # --allow-dirty: the built UI is gitignored but pulled in via the
              # crate's `include`, which cargo otherwise treats as a dirty tree.
              if cargo publish -p "$name" --locked --allow-dirty; then progress=1; fi
            done
            [ "$remaining" = 0 ] && exit 0
            [ "$progress" = 0 ] && { echo "no progress in pass $pass"; exit 1; }
          done
          echo "crates still unpublished after ${#pkgs[@]} passes"; exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
          # The runner hits spurious HTTP/2 broken-pipe errors against crates.io,
          # which desync cargo's wait-for-publish loop. HTTP/1.1 and a longer
          # confirmation window keep chained publishes alive.
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_PUBLISH_TIMEOUT: "300"

  release-binaries:
    name: Release binaries (${{ matrix.target }})
    # Only meaningful for version tags; manual dispatch reruns on a branch ref
    # skip this job.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write # create the release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest # cross-compiled; Intel runners are being retired
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Build the (uncommitted) web UI so it is embedded into velos-apiserver.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build web UI
        run: cd web && npm ci && npm run build

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p velos-apiserver -p veloslet -p velosctl

      - name: Package
        run: |
          tar -czf "velos-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" velos-apiserver veloslet velosctl

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # First matrix job to get here creates the release; the rest just upload.
          gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --generate-notes 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" "velos-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" --clobber
